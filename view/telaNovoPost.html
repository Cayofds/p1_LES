<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Novo Post</title>
  <link rel="stylesheet" href="../css/views/register.css">
  <style>
    .preview { max-width:220px; max-height:180px; display:block; margin-top:8px; }
    .form-row { margin-bottom:12px; }
    .error-message { color:#b91c1c; margin-bottom:10px; padding: 10px; background: #f5f5f5; border-radius: 4px; }
    .success-message { color:#065f46; margin-bottom:10px; padding: 10px; background: #f5f5f5; border-radius: 4px; }
    .loading-btn { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h1 class="auth-title">Criar novo post</h1>

    <div id="message-container"></div>

    <form id="post-form">
      <div class="form-row">
        <label for="titulo">Título</label>
        <input type="text" id="titulo" name="titulo" class="auth-input" required>
      </div>

      <div class="form-row">
        <label for="id_categoria">Categoria</label>
        <select id="id_categoria" name="id_categoria" class="auth-input" required>
          <option value="0" disabled selected>— carregando categorias —</option>
        </select>
        <div id="categoria-manual-input" style="display:none; margin-top: 6px;">
          <input type="number" id="id_categoria_manual" name="id_categoria_manual" class="auth-input" placeholder="ID da categoria (obrigatório)">
          <div style="font-size:0.9rem; color:#555; margin-top:6px">Nenhuma categoria disponível para selecionar — informe o ID da categoria manualmente.</div>
        </div>
      </div>

      <div class="form-row">
        <label for="img">Imagem (PNG/JPG/GIF, opcional)</label>
        <input type="file" id="img" name="img" accept="image/*" class="auth-input">
        <img id="preview" class="preview" style="display:none" src="#" alt="preview">
      </div>

      <div class="form-row">
        <button type="submit" class="auth-button" id="submit-btn">Publicar</button>
        <a class="btn-secondary" href="./telaHome.html" style="margin-left:8px">Voltar</a>
      </div>
    </form>
  </div>

  <script>
    // Função para escapar HTML e evitar XSS
    function escapeHtml(text) {
      if (!text) return '';
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Função para mostrar mensagens
    function showMessage(message, type) {
      const container = document.getElementById('message-container');
      const className = type === 'error' ? 'error-message' : 'success-message';
      container.innerHTML = `<div class="${className}">${escapeHtml(message)}</div>`;
    }

    // Carrega categorias ao iniciar
    async function loadCategories() {
      try {
        const response = await fetch('../api/getCategories.html');
        
        if (!response.ok) {
          throw new Error('Erro ao carregar categorias');
        }

        const data = await response.json();
        
        if (data.requiresAuth === false) {
          window.location.href = './telaLogin.html';
          return;
        }

        populateCategories(data.categorias || []);
      } catch (error) {
        console.error('Erro ao carregar categorias:', error);
        showMessage('Erro ao carregar categorias', 'error');
        // Mostra input manual como fallback
        toggleManualCategoryInput(true);
      }
    }

    // Popula o select de categorias
    function populateCategories(categorias) {
      const select = document.getElementById('id_categoria');
      
      if (!categorias || categorias.length === 0) {
        toggleManualCategoryInput(true);
        select.disabled = true;
        return;
      }

      select.innerHTML = '<option value="0" disabled selected>— escolha —</option>';
      
      categorias.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat.id;
        option.textContent = escapeHtml(cat.label);
        select.appendChild(option);
      });

      toggleManualCategoryInput(false);
    }

    // Alterna entre select e input manual
    function toggleManualCategoryInput(show) {
      const manualDiv = document.getElementById('categoria-manual-input');
      const select = document.getElementById('id_categoria');
      
      if (show) {
        manualDiv.style.display = 'block';
        select.style.display = 'none';
      } else {
        manualDiv.style.display = 'none';
        select.style.display = 'block';
      }
    }

    // Preview de imagem
    document.getElementById('img').addEventListener('change', function(e) {
      const file = e.target.files[0];
      const preview = document.getElementById('preview');
      
      if (!file) {
        preview.style.display = 'none';
        return;
      }

      // Validação básica de tamanho (5MB)
      if (file.size > 5 * 1024 * 1024) {
        showMessage('Imagem muito grande (máx 5MB)', 'error');
        e.target.value = '';
        preview.style.display = 'none';
        return;
      }

      // Validação de tipo
      const allowedTypes = ['image/jpeg', 'image/png', 'image/gif'];
      if (!allowedTypes.includes(file.type)) {
        showMessage('Tipo de imagem não permitido. Use PNG/JPG/GIF', 'error');
        e.target.value = '';
        preview.style.display = 'none';
        return;
      }

      const url = URL.createObjectURL(file);
      preview.src = url;
      preview.style.display = 'block';
    });

    // Envio do formulário
    document.getElementById('post-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const titulo = document.getElementById('titulo').value.trim();
      let id_categoria = document.getElementById('id_categoria').value;
      
      // Se usar input manual
      if (document.getElementById('categoria-manual-input').style.display !== 'none') {
        id_categoria = document.getElementById('id_categoria_manual').value;
      }

      id_categoria = parseInt(id_categoria);

      // Validações
      if (titulo === '') {
        showMessage('Título é obrigatório', 'error');
        return;
      }

      if (id_categoria <= 0) {
        showMessage('Categoria é obrigatória', 'error');
        return;
      }

      // Prepara FormData
      const formData = new FormData();
      formData.append('titulo', titulo);
      formData.append('id_categoria', id_categoria);

      const imgInput = document.getElementById('img');
      if (imgInput.files.length > 0) {
        formData.append('img', imgInput.files[0]);
      }

      // Desabilita botão
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.classList.add('loading-btn');
      submitBtn.textContent = 'Publicando...';

      try {
        const response = await fetch('../api/createPost.php', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          if (response.status === 401) {
            window.location.href = './telaLogin.php';
            return;
          }
          throw new Error(data.error || 'Erro ao criar post');
        }

        showMessage('Post criado com sucesso!', 'success');
        
        // Redireciona após 2 segundos
        setTimeout(() => {
          window.location.href = './telaHome.php';
        }, 2000);

      } catch (error) {
        console.error('Erro ao criar post:', error);
        showMessage(error.message, 'error');
        
        // Reabilita botão
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading-btn');
        submitBtn.textContent = 'Publicar';
      }
    });

    // Carrega categorias quando a página inicia
    document.addEventListener('DOMContentLoaded', loadCategories);
  </script>
</body>
</html>
